<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leer es viajar</title>
<meta name="description" content="No importa cuántos libros has leído. Importa adónde te han llevado.">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --white: #ffffff;
  --ink: #1c1c1a;
  --muted: #a0a09a;
  --subtle: #d8d8d4;
  --teal: #2a8c6e;
}

html, body {
  height: 100%;
  font-family: 'Inter', sans-serif;
  background: var(--white);
  color: var(--ink);
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 4rem 2rem;
}

/* FONDO — rutas SVG muy sutiles */
.map-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  opacity: 0.12;
  pointer-events: none;
}

/* CONTENIDO */
.content {
  position: relative;
  z-index: 1;
  text-align: center;
  max-width: 420px;
  width: 100%;
}

/* WORDMARK */
.wordmark {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(1.9rem, 5vw, 2.6rem);
  color: var(--ink);
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 1.2rem;
}
.wordmark em {
  font-style: italic;
  color: var(--teal);
}

/* TAGLINE */
.tagline {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(0.9rem, 2vw, 1rem);
  color: var(--muted);
  font-style: italic;
  line-height: 1.75;
  margin-bottom: 0.4rem;
}
.tagline strong {
  color: var(--ink);
  font-style: normal;
  font-weight: 400;
}

/* BETA BADGE */
.beta-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  margin: 1.4rem 0 2.2rem;
}
.beta-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--teal);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.35; transform: scale(0.75); }
}
.beta-label {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}

/* FORMULARIO — sin card, directo sobre el blanco */
.form-intro {
  font-size: 0.82rem;
  color: var(--muted);
  margin-bottom: 2rem;
  line-height: 1.7;
}

.field {
  margin-bottom: 1.2rem;
  text-align: left;
}

label {
  display: block;
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}

input, textarea {
  width: 100%;
  padding: 0.6rem 0;
  border: none;
  border-bottom: 1px solid var(--subtle);
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  color: var(--ink);
  background: transparent;
  transition: border-color 0.2s;
  outline: none;
  border-radius: 0;
}
input:focus, textarea:focus {
  border-bottom-color: var(--teal);
}
input::placeholder, textarea::placeholder {
  color: var(--subtle);
}
textarea {
  resize: none;
  min-height: 72px;
}

button {
  width: 100%;
  margin-top: 0.8rem;
  padding: 0.85rem;
  background: var(--teal);
  color: white;
  border: none;
  border-radius: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: opacity 0.2s;
}
button:hover { opacity: 0.85; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

.success {
  display: none;
  text-align: center;
  padding: 1rem 0;
}
.success-icon {
  font-size: 1.6rem;
  margin-bottom: 1rem;
  color: var(--teal);
}
.success h3 {
  font-family: 'Instrument Serif', serif;
  font-size: 1.3rem;
  margin-bottom: 0.6rem;
}
.success p {
  font-size: 0.82rem;
  color: var(--muted);
  line-height: 1.7;
}

/* PIE */
footer {
  margin-top: 3rem;
  font-size: 0.7rem;
  color: var(--subtle);
  letter-spacing: 0.08em;
}
</style>
</head>
<body>

<!-- Fondo con rutas SVG muy tenues -->
<div class="map-bg">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <g stroke="#2a8c6e" stroke-width="1" fill="none" stroke-dasharray="5,10">
      <path d="M 80 600 Q 300 200 520 350"/>
      <path d="M 520 350 Q 700 480 920 180"/>
      <path d="M 920 180 Q 1050 90 1150 240"/>
      <path d="M 200 750 Q 450 500 680 620"/>
      <path d="M 680 620 Q 850 720 1100 500"/>
      <path d="M 50 300 Q 250 150 400 280"/>
      <path d="M 400 280 Q 580 400 750 300"/>
      <path d="M 750 300 Q 950 200 1100 350"/>
      <path d="M 150 500 Q 350 380 550 460"/>
    </g>
    <g fill="#2a8c6e">
      <circle cx="520" cy="350" r="3"/>
      <circle cx="920" cy="180" r="3"/>
      <circle cx="680" cy="620" r="3"/>
      <circle cx="400" cy="280" r="3"/>
      <circle cx="750" cy="300" r="3"/>
    </g>
    <g fill="#8b5cf6">
      <circle cx="550" cy="460" r="3"/>
      <circle cx="1100" cy="500" r="3"/>
    </g>
  </svg>
</div>

<div class="content">

  <div class="wordmark">Leer <em>es</em> viajar</div>

  <p class="tagline">
    No importa cuántos libros has leído.<br>
    <strong>Importa adónde te han llevado.</strong>
  </p>

  <div class="beta-wrap">
    <span class="beta-dot"></span>
    <span class="beta-label">Beta privada — acceso limitado</span>
  </div>

  <div id="form-inner">
    <div class="field">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" placeholder="Cómo te llamamos" required>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Tu correo" required>
    </div>

    <div class="field">
      <label for="conocido">¿Cómo nos has conocido?</label>
      <input type="text" id="conocido" name="como_nos_conociste" placeholder="Una persona, una red, un evento…">
    </div>

    <div class="field">
      <label for="porque">¿Por qué quieres unirte?</label>
      <textarea id="porque" name="porque" placeholder="Cuéntanos un poco…"></textarea>
    </div>

    <button id="btn-enviar" onclick="enviar()">Pedir acceso</button>
  </div>

  <div class="success" id="success">
    <div class="success-icon">✦</div>
    <h3>Te tenemos</h3>
    <p>Te avisaremos cuando abramos un hueco.<br>Mientras, sigue viajando entre páginas.</p>
  </div>

  <footer>leeresviajar.app</footer>
</div>

<script>
async function enviar() {
  const btn = document.getElementById('btn-enviar');
  const nombre = document.getElementById('nombre').value.trim();
  const email = document.getElementById('email').value.trim();
  const porque = document.getElementById('porque').value.trim();
  const conocido = document.getElementById('conocido').value.trim();

  if (!nombre || !email) {
    alert('Nombre y email son necesarios.');
    return;
  }

  btn.textContent = 'Enviando…';
  btn.disabled = true;

  try {
    const res = await fetch('https://formspree.io/f/mnjkprng', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ nombre, email, como_nos_conociste: conocido, porque })
    });

    if (res.ok) {
      document.getElementById('form-inner').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    } else {
      btn.textContent = 'Error. Inténtalo de nuevo.';
      btn.disabled = false;
    }
  } catch(err) {
    btn.textContent = 'Error. Inténtalo de nuevo.';
    btn.disabled = false;
  }
}
</script>

</body>
</html>
